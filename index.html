<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anim-Dex Public</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0.1; }
            50% { opacity: 1; }
            100% { transform: translateY(300px); opacity: 0.1; }
        }
        @keyframes bounce-custom {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.4); }
        }
        .animate-scan { animation: scan 1.5s linear infinite; }
        .animate-bounce-custom { animation: bounce-custom 0.6s infinite; }
    </style>
</head>
<body class="bg-black text-white font-mono flex flex-col items-center select-none overflow-x-hidden min-h-screen">

    <!-- Pokédex Header -->
    <div class="w-full max-w-md bg-red-600 p-6 rounded-t-[50px] border-b-8 border-red-800 shadow-2xl mt-4 relative overflow-hidden">
        <div class="flex justify-between items-center relative z-10">
            <div class="flex gap-4 items-center">
                <div class="w-16 h-16 bg-blue-500 rounded-full border-4 border-zinc-100 shadow-[0_0_20px_rgba(59,130,246,0.6)] flex items-center justify-center overflow-hidden">
                    <div class="w-full h-full bg-gradient-to-br from-blue-300 via-blue-500 to-blue-800 animate-pulse"></div>
                </div>
                <div class="space-y-1">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-800 border border-black/30"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400 border border-black/30"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500 border border-black/30"></div>
                    </div>
                    <div class="text-[10px] font-black text-red-950 uppercase">Retro-Dex Public</div>
                </div>
            </div>
            <button id="muteBtn" class="p-3 rounded-xl border-2 bg-red-500 border-red-400 text-white shadow-lg active:scale-90">
                <i data-lucide="volume-2" id="volumeIcon"></i>
            </button>
        </div>
    </div>

    <!-- Viewfinder -->
    <div class="w-full max-w-md bg-zinc-200 p-6 border-x-[12px] border-red-600">
        <div class="relative aspect-square bg-black rounded-3xl overflow-hidden border-4 border-zinc-400 shadow-2xl">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <img id="capturedImg" class="w-full h-full object-cover hidden">
            <div id="shutterFlash" class="absolute inset-0 bg-white z-50 opacity-0 pointer-events-none transition-opacity duration-150"></div>

            <div class="absolute inset-0 p-6 flex flex-col justify-between pointer-events-none">
                <div class="flex justify-between items-start opacity-50">
                    <div id="corner-tl" class="w-8 h-8 border-t-2 border-l-2 border-emerald-500"></div>
                    <div id="corner-tr" class="w-8 h-8 border-t-2 border-r-2 border-emerald-500"></div>
                </div>
                <div id="scanningUI" class="self-center flex flex-col items-center hidden">
                    <i data-lucide="cpu" class="text-red-500 animate-pulse mb-2 w-10 h-10"></i>
                    <div class="bg-black/90 px-3 py-1 rounded text-red-500 text-[10px] font-black border border-red-500 shadow-[0_0_10px_red]">BUS_READ_ACTIVE</div>
                    <div class="w-full h-1 bg-red-500 absolute top-0 animate-scan"></div>
                </div>
                <div class="flex justify-between items-end opacity-50">
                    <div id="corner-bl" class="w-8 h-8 border-b-2 border-l-2 border-emerald-500"></div>
                    <div id="corner-br" class="w-8 h-8 border-b-2 border-r-2 border-emerald-500"></div>
                </div>
            </div>
        </div>
        <button id="actionBtn" class="mt-6 w-full py-6 rounded-2xl flex items-center justify-center gap-3 text-2xl font-black shadow-[0_6px_0_#991b1b] active:translate-y-1 active:shadow-none bg-red-600 text-white">
            <i data-lucide="camera" id="btnIcon"></i> <span id="btnText">CAPTURE</span>
        </button>
    </div>

    <!-- Data Panel -->
    <div class="w-full max-w-md bg-red-600 rounded-b-[40px] p-6 border-t-[12px] border-red-400/20 flex-1 min-h-[350px]">
        <div id="dataScreen" class="h-full rounded-3xl p-6 border-4 bg-zinc-950 border-zinc-800 flex flex-col transition-all duration-700">
            <div id="idleScreen" class="h-full flex flex-col items-center justify-center opacity-10">
                <i data-lucide="globe" class="text-white animate-[spin_30s_linear_infinite] w-20 h-20"></i>
                <p class="mt-4 font-black uppercase tracking-[0.5em] text-[10px]">Awaiting Serial Data</p>
            </div>
            <div id="resultScreen" class="hidden flex flex-col h-full">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 id="animalName" class="text-3xl font-black uppercase text-zinc-400">SPECIES</h2>
                        <div class="flex items-center gap-2">
                            <span id="rarityLabel" class="text-[10px] font-black px-2 py-0.5 rounded border border-emerald-500 text-emerald-500 uppercase">COMMON</span>
                            <span id="habitatLabel" class="text-[10px] font-black uppercase text-white/30">SYSTEM MODE</span>
                        </div>
                    </div>
                    <div id="voiceWave" class="hidden gap-1 items-end h-8">
                        <div class="w-1.5 bg-current animate-bounce-custom h-full"></div>
                        <div class="w-1.5 bg-current animate-bounce-custom h-3/4"></div>
                        <div class="w-1.5 bg-current animate-bounce-custom h-1/2"></div>
                    </div>
                </div>
                <p id="animalDesc" class="text-white/90 text-[15px] leading-tight mb-6 border-l-4 pl-4 font-bold italic border-zinc-800"></p>
                <div class="grid grid-cols-2 gap-x-4 gap-y-3" id="statsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR GEMINI API KEY BELOW
        const PUBLIC_API_KEY = "YOUR_API_KEY_HERE";

        const themes = {
            Forest: { bg: 'bg-emerald-950', border: 'border-emerald-800', text: 'text-emerald-400', accent: 'bg-emerald-500' },
            Aquatic: { bg: 'bg-cyan-950', border: 'border-cyan-800', text: 'text-cyan-400', accent: 'bg-cyan-500' },
            Desert: { bg: 'bg-orange-950', border: 'border-orange-800', text: 'text-orange-400', accent: 'bg-orange-500' },
            Aerial: { bg: 'bg-indigo-950', border: 'border-indigo-800', text: 'text-indigo-400', accent: 'bg-indigo-500' },
            Urban: { bg: 'bg-slate-900', border: 'border-slate-700', text: 'text-slate-300', accent: 'bg-slate-400' },
            Default: { bg: 'bg-zinc-950', border: 'border-zinc-800', text: 'text-zinc-400', accent: 'bg-zinc-500' }
        };

        const state = { isScanning: false, captured: false, mute: false };
        const el = {
            video: document.getElementById('video'),
            capturedImg: document.getElementById('capturedImg'),
            canvas: document.getElementById('canvas'),
            actionBtn: document.getElementById('actionBtn'),
            scanningUI: document.getElementById('scanningUI'),
            idleScreen: document.getElementById('idleScreen'),
            resultScreen: document.getElementById('resultScreen'),
            dataScreen: document.getElementById('dataScreen'),
            btnText: document.getElementById('btnText')
        };

        const synth = window.speechSynthesis;
        lucide.createIcons();

        // Start Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => el.video.srcObject = s).catch(e => console.error(e));

        function speak8Bit(text) {
            if (state.mute || !synth) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 1.35; u.pitch = 0.75;
            u.onstart = () => document.getElementById('voiceWave').classList.replace('hidden', 'flex');
            u.onend = () => document.getElementById('voiceWave').classList.replace('flex', 'hidden');
            synth.speak(u);
        }

        async function handleScan() {
            if (PUBLIC_API_KEY === "AIzaSyDoc3kKiY1r7XkHzkbFfUHmSpXw_I5whkc") {
                alert("Please add your API Key to the code first!");
                return;
            }

            document.getElementById('shutterFlash').classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => document.getElementById('shutterFlash').classList.replace('opacity-100', 'opacity-0'), 100);

            const ctx = el.canvas.getContext('2d');
            el.canvas.width = el.video.videoWidth; el.canvas.height = el.video.videoHeight;
            ctx.drawImage(el.video, 0, 0);
            const base64 = el.canvas.toDataURL('image/jpeg').split(',')[1];

            el.video.classList.add('hidden');
            el.capturedImg.src = el.canvas.toDataURL('image/jpeg');
            el.capturedImg.classList.remove('hidden');
            
            state.isScanning = true; state.captured = true;
            el.scanningUI.classList.remove('hidden');
            el.actionBtn.classList.replace('bg-red-600', 'bg-zinc-800');
            el.btnText.innerText = "BUSY...";

            speak8Bit("Analyzing biological signature.");

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${PUBLIC_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Identify animal. Return JSON: { \"name\": \"string\", \"habitat_type\": \"Forest|Aquatic|Desert|Aerial|Urban\", \"description\": \"2-sentence clinical entry.\", \"rarity_label\": \"Common|Legendary\", \"stats\": {\"HP\": 50, \"ATK\": 50, \"DEF\": 50, \"SPD\": 50} }" },
                            { inlineData: { mimeType: "image/jpeg", data: base64 } }
                        ]}]
                    })
                });

                const json = await res.json();
                const data = JSON.parse(json.candidates[0].content.parts[0].text);
                
                const theme = themes[data.habitat_type] || themes.Default;
                el.dataScreen.className = `h-full rounded-3xl p-6 border-4 flex flex-col ${theme.bg} ${theme.border}`;
                document.getElementById('animalName').innerText = data.name;
                document.getElementById('animalName').className = `text-3xl font-black uppercase ${theme.text}`;
                document.getElementById('animalDesc').innerText = data.description;
                document.getElementById('habitatLabel').innerText = data.habitat_type;
                
                document.getElementById('statsGrid').innerHTML = Object.entries(data.stats).map(([k,v]) => `
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black uppercase ${theme.text}"><span>${k}</span><span>${v}</span></div>
                        <div class="h-2 bg-black/40 rounded-full border border-white/5"><div class="h-full ${theme.accent}" style="width: ${v}%"></div></div>
                    </div>`).join('');

                el.idleScreen.classList.add('hidden');
                el.resultScreen.classList.remove('hidden');
                el.btnText.innerText = "NEW SCAN";

                speak8Bit(`Identification confirmed. ${data.name}. ${data.description}`);
            } catch (err) {
                speak8Bit("Error. Database unreachable.");
                el.btnText.innerText = "RETRY";
            } finally {
                state.isScanning = false;
                el.scanningUI.classList.add('hidden');
            }
        }

        el.actionBtn.addEventListener('click', () => {
            if (state.captured && !state.isScanning) {
                state.captured = false; el.video.classList.remove('hidden'); el.capturedImg.classList.add('hidden');
                el.idleScreen.classList.remove('hidden'); el.resultScreen.classList.add('hidden');
                el.actionBtn.classList.replace('bg-zinc-800', 'bg-red-600'); el.btnText.innerText = "CAPTURE";
            } else handleScan();
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            state.mute = !state.mute;
            if (state.mute && synth) synth.cancel();
            document.getElementById('volumeIcon').setAttribute('data-lucide', state.mute ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        });
    </script>
</body>
</html>
