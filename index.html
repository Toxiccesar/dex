<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anim-Dex Retro Chroma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0.1; }
            50% { opacity: 1; }
            100% { transform: translateY(300px); opacity: 0.1; }
        }
        @keyframes bounce-custom {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.4); }
        }
        .animate-scan { animation: scan 1.5s linear infinite; }
        .animate-bounce-custom { animation: bounce-custom 0.6s infinite; }
        .pixel-corners { clip-path: polygon(0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% - 4px, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)); }
    </style>
</head>
<body class="bg-black text-white font-mono flex flex-col items-center select-none overflow-x-hidden min-h-screen">

    <!-- Pokédex Chassis - Top Header -->
    <div class="w-full max-w-md bg-red-600 p-6 rounded-t-[50px] border-b-8 border-red-800 shadow-2xl mt-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16 blur-3xl pointer-events-none"></div>
        <div class="flex justify-between items-center relative z-10">
            <div class="flex gap-4 items-center">
                <div class="w-16 h-16 bg-blue-500 rounded-full border-4 border-zinc-100 shadow-[0_0_20px_rgba(59,130,246,0.6)] flex items-center justify-center overflow-hidden">
                    <div class="w-full h-full bg-gradient-to-br from-blue-300 via-blue-500 to-blue-800 animate-pulse"></div>
                </div>
                <div class="space-y-1">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-800 border border-black/30 shadow-inner"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400 border border-black/30"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500 border border-black/30"></div>
                    </div>
                    <div class="text-[10px] font-black text-red-950 uppercase tracking-tighter">Retro-Dex v3.5</div>
                </div>
            </div>
            <button id="muteBtn" class="p-3 rounded-xl border-2 transition-all shadow-lg bg-red-500 border-red-400 text-white">
                <i data-lucide="volume-2" id="volumeIcon"></i>
            </button>
        </div>
    </div>

    <!-- Main Viewfinder Section -->
    <div class="w-full max-w-md bg-zinc-200 p-6 border-x-[12px] border-red-600">
        <div class="relative aspect-square bg-black rounded-3xl overflow-hidden border-4 border-zinc-400 shadow-2xl">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <img id="capturedImg" class="w-full h-full object-cover hidden" alt="Captured">
            
            <div id="shutterFlash" class="absolute inset-0 bg-white z-50 opacity-0 pointer-events-none transition-opacity duration-150"></div>

            <!-- Scanning HUD Overlays -->
            <div class="absolute inset-0 p-6 flex flex-col justify-between pointer-events-none">
                <div class="flex justify-between items-start opacity-50">
                    <div id="corner-tl" class="w-8 h-8 border-t-2 border-l-2 border-emerald-500"></div>
                    <div id="corner-tr" class="w-8 h-8 border-t-2 border-r-2 border-emerald-500"></div>
                </div>
                
                <div id="scanningUI" class="self-center flex flex-col items-center hidden">
                    <i data-lucide="cpu" class="text-red-500 animate-pulse mb-2" style="width: 40px; height: 40px;"></i>
                    <div class="bg-black/90 px-3 py-1 rounded text-red-500 text-[10px] font-black tracking-widest border border-red-500 shadow-[0_0_10px_red]">BUS_READ_ACTIVE</div>
                    <div class="w-full h-1 bg-red-500 shadow-[0_0_15px_red] absolute top-0 animate-scan"></div>
                </div>

                <div class="flex justify-between items-end opacity-50">
                    <div id="corner-bl" class="w-8 h-8 border-b-2 border-l-2 border-emerald-500"></div>
                    <div id="corner-br" class="w-8 h-8 border-b-2 border-r-2 border-emerald-500"></div>
                </div>
            </div>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <button id="actionBtn" class="mt-6 w-full py-5 rounded-2xl flex items-center justify-center gap-3 text-2xl font-black transition-all active:scale-95 shadow-[0_6px_0_#991b1b] active:translate-y-1 active:shadow-none bg-red-600 text-white">
            <i data-lucide="camera" id="btnIcon"></i>
            <span id="btnText">PROCESS</span>
        </button>
    </div>

    <!-- Screen / Data Panel -->
    <div class="w-full max-w-md bg-red-600 rounded-b-[40px] p-6 shadow-2xl border-t-[12px] border-red-400/20 flex-1 min-h-[350px]">
        <div id="dataScreen" class="h-full rounded-3xl p-6 border-4 shadow-[inset_0_0_40px_rgba(0,0,0,0.5)] transition-all duration-700 flex flex-col bg-zinc-950 border-zinc-800">
            
            <div id="idleScreen" class="h-full flex flex-col items-center justify-center opacity-10">
                <i data-lucide="globe" class="text-white animate-[spin_30s_linear_infinite]" style="width: 80px; height: 80px;"></i>
                <p class="mt-4 font-black uppercase tracking-[0.5em] text-[10px]">Awaiting Serial Data</p>
            </div>

            <div id="resultScreen" class="hidden flex flex-col h-full">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 id="animalName" class="text-3xl font-black uppercase tracking-tighter leading-none mb-1 text-zinc-400">SPECIES NAME</h2>
                        <div class="flex items-center gap-2">
                            <span id="rarityLabel" class="text-[10px] font-black px-2 py-0.5 rounded border uppercase border-emerald-500 text-emerald-500">COMMON</span>
                            <span id="habitatLabel" class="text-[10px] font-black uppercase text-white/30 tracking-widest">SYSTEM MODE</span>
                        </div>
                    </div>
                    <div id="voiceWave" class="flex gap-1 items-end h-8 hidden">
                        <div class="w-1.5 bg-current animate-bounce-custom h-full"></div>
                        <div class="w-1.5 bg-current animate-bounce-custom h-3/4" style="animation-delay: 0.1s"></div>
                        <div class="w-1.5 bg-current animate-bounce-custom h-1/2" style="animation-delay: 0.2s"></div>
                    </div>
                </div>

                <div class="flex-1">
                    <p id="animalDesc" class="text-white/90 text-[15px] leading-tight mb-6 border-l-4 pl-4 font-bold italic border-zinc-800">
                        Analyzing specimen data...
                    </p>
                    
                    <div class="grid grid-cols-2 gap-x-4 gap-y-3" id="statsGrid">
                        <!-- Stats injected here -->
                    </div>
                </div>

                <div id="legendaryMsg" class="mt-4 flex items-center justify-center gap-2 text-yellow-400 animate-pulse hidden">
                    <i data-lucide="sparkles" size="16"></i>
                    <span class="text-[10px] font-black tracking-widest uppercase">Rare Signature Detected</span>
                </div>
            </div>
        </div>

        <!-- Console Buttons Decoration -->
        <div class="mt-6 flex justify-between items-center px-2">
            <div class="grid grid-cols-3 gap-0">
                <div class="w-6 h-6 bg-zinc-900 rounded-sm col-start-2 shadow-inner"></div>
                <div class="w-6 h-6 bg-zinc-900 rounded-sm row-start-2 shadow-inner"></div>
                <div class="w-6 h-6 bg-zinc-950 rounded-sm row-start-2 col-start-2"></div>
                <div class="w-6 h-6 bg-zinc-900 rounded-sm row-start-2 col-start-3 shadow-inner"></div>
                <div class="w-6 h-6 bg-zinc-900 rounded-sm row-start-3 col-start-2 shadow-inner"></div>
            </div>
            <div class="flex gap-4">
                <div class="w-12 h-3 bg-zinc-900 rounded-full rotate-[-20deg]"></div>
                <div class="w-12 h-3 bg-zinc-900 rounded-full rotate-[-20deg]"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        const themes = {
            Forest: { bg: 'bg-emerald-950', border: 'border-emerald-800', text: 'text-emerald-400', accent: 'bg-emerald-500' },
            Aquatic: { bg: 'bg-cyan-950', border: 'border-cyan-800', text: 'text-cyan-400', accent: 'bg-cyan-500' },
            Desert: { bg: 'bg-orange-950', border: 'border-orange-800', text: 'text-orange-400', accent: 'bg-orange-500' },
            Aerial: { bg: 'bg-indigo-950', border: 'border-indigo-800', text: 'text-indigo-400', accent: 'bg-indigo-500' },
            Urban: { bg: 'bg-slate-900', border: 'border-slate-700', text: 'text-slate-300', accent: 'bg-slate-400' },
            Default: { bg: 'bg-zinc-950', border: 'border-zinc-800', text: 'text-zinc-400', accent: 'bg-zinc-500' }
        };

        const state = {
            isScanning: false,
            captured: false,
            mute: false,
            speaking: false
        };

        const elements = {
            video: document.getElementById('video'),
            capturedImg: document.getElementById('capturedImg'),
            canvas: document.getElementById('canvas'),
            shutter: document.getElementById('shutterFlash'),
            actionBtn: document.getElementById('actionBtn'),
            btnText: document.getElementById('btnText'),
            btnIcon: document.getElementById('btnIcon'),
            scanningUI: document.getElementById('scanningUI'),
            idleScreen: document.getElementById('idleScreen'),
            resultScreen: document.getElementById('resultScreen'),
            animalName: document.getElementById('animalName'),
            animalDesc: document.getElementById('animalDesc'),
            rarityLabel: document.getElementById('rarityLabel'),
            habitatLabel: document.getElementById('habitatLabel'),
            statsGrid: document.getElementById('statsGrid'),
            dataScreen: document.getElementById('dataScreen'),
            legendaryMsg: document.getElementById('legendaryMsg'),
            voiceWave: document.getElementById('voiceWave'),
            muteBtn: document.getElementById('muteBtn'),
            volumeIcon: document.getElementById('volumeIcon')
        };

        const synth = window.speechSynthesis;
        lucide.createIcons();

        // Init Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                elements.video.srcObject = stream;
            } catch (err) {
                console.error("Camera failed:", err);
            }
        }

        function speak8Bit(text) {
            if (state.mute || !synth) return;
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            const voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
            utterance.voice = voice;
            utterance.rate = 1.35;
            utterance.pitch = 0.75;
            utterance.onstart = () => {
                elements.voiceWave.classList.remove('hidden');
                elements.voiceWave.classList.add('flex');
            };
            utterance.onend = () => {
                elements.voiceWave.classList.add('hidden');
                elements.voiceWave.classList.remove('flex');
            };
            synth.speak(utterance);
        }

        function applyTheme(habitat) {
            const theme = themes[habitat] || themes.Default;
            elements.dataScreen.className = `h-full rounded-3xl p-6 border-4 shadow-[inset_0_0_40px_rgba(0,0,0,0.5)] transition-all duration-700 flex flex-col ${theme.bg} ${theme.border}`;
            elements.animalName.className = `text-3xl font-black uppercase tracking-tighter leading-none mb-1 ${theme.text}`;
            elements.animalDesc.className = `text-white/90 text-[15px] leading-tight mb-6 border-l-4 pl-4 font-bold italic ${theme.border}`;
            
            // Corners
            ['tl', 'tr', 'bl', 'br'].forEach(pos => {
                document.getElementById(`corner-${pos}`).className = `w-8 h-8 border-${pos[0]}-2 border-${pos[1]}-2 ${theme.text.replace('text', 'border')}`;
            });

            return theme;
        }

        async function handleScan() {
            if (state.isScanning) return;
            
            // Shutter
            elements.shutter.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => elements.shutter.classList.replace('opacity-100', 'opacity-0'), 100);

            // Capture
            const ctx = elements.canvas.getContext('2d');
            elements.canvas.width = elements.video.videoWidth;
            elements.canvas.height = elements.video.videoHeight;
            ctx.drawImage(elements.video, 0, 0);
            const base64 = elements.canvas.toDataURL('image/jpeg').split(',')[1];

            elements.video.classList.add('hidden');
            elements.capturedImg.src = elements.canvas.toDataURL('image/jpeg');
            elements.capturedImg.classList.remove('hidden');
            
            state.isScanning = true;
            state.captured = true;
            elements.scanningUI.classList.remove('hidden');
            elements.actionBtn.classList.replace('bg-red-600', 'bg-zinc-800');
            elements.actionBtn.classList.replace('text-white', 'text-zinc-400');
            elements.btnText.innerText = "BUSY...";

            speak8Bit("Analyzing biological signature. Syncing with global database.");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Identify animal. Return JSON: { \"name\": \"string\", \"habitat_type\": \"Forest|Aquatic|Desert|Aerial|Urban\", \"description\": \"2-sentence clinical entry.\", \"rarity_label\": \"Common|Uncommon|Rare|Legendary\", \"stats\": {\"HP\": 1-100, \"ATK\": 1-100, \"DEF\": 1-100, \"SPD\": 1-100} }" },
                                { inlineData: { mimeType: "image/jpeg", data: base64 } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const json = await response.json();
                const data = JSON.parse(json.candidates[0].content.parts[0].text);
                
                // Update UI
                const theme = applyTheme(data.habitat_type);
                elements.animalName.innerText = data.name;
                elements.animalDesc.innerText = data.description;
                elements.habitatLabel.innerText = `${data.habitat_type} MODE`;
                elements.rarityLabel.innerText = data.rarity_label;
                
                const rarityColors = { Legendary: 'text-yellow-400 border-yellow-400', Rare: 'text-purple-400 border-purple-400', Uncommon: 'text-blue-400 border-blue-400' };
                elements.rarityLabel.className = `text-[10px] font-black px-2 py-0.5 rounded border uppercase ${rarityColors[data.rarity_label] || 'text-emerald-500 border-emerald-500'}`;
                
                elements.legendaryMsg.classList.toggle('hidden', data.rarity_label !== 'Legendary');

                elements.statsGrid.innerHTML = Object.entries(data.stats).map(([k,v]) => `
                    <div class="space-y-1">
                        <div class="flex justify-between text-[9px] font-black uppercase ${theme.text}">
                            <span>${k}</span>
                            <span>${v}</span>
                        </div>
                        <div class="h-2 bg-black/40 rounded-full overflow-hidden border border-white/5">
                            <div class="h-full transition-all duration-1000 ${theme.accent}" style="width: ${v}%"></div>
                        </div>
                    </div>
                `).join('');

                elements.idleScreen.classList.add('hidden');
                elements.resultScreen.classList.remove('hidden');
                
                elements.btnText.innerText = "NEW SCAN";
                elements.btnIcon.setAttribute('data-lucide', 'refresh-cw');
                lucide.createIcons();

                speak8Bit(`Identification confirmed. ${data.name}. ${data.description}`);

            } catch (err) {
                console.error(err);
                speak8Bit("System error. Data corrupted.");
                elements.btnText.innerText = "RETRY";
            } finally {
                state.isScanning = false;
                elements.scanningUI.classList.add('hidden');
            }
        }

        function reset() {
            state.captured = false;
            state.isScanning = false;
            elements.video.classList.remove('hidden');
            elements.capturedImg.classList.add('hidden');
            elements.idleScreen.classList.remove('hidden');
            elements.resultScreen.classList.add('hidden');
            elements.actionBtn.classList.replace('bg-zinc-800', 'bg-red-600');
            elements.actionBtn.classList.replace('text-zinc-400', 'text-white');
            elements.btnText.innerText = "PROCESS";
            elements.btnIcon.setAttribute('data-lucide', 'camera');
            lucide.createIcons();
            applyTheme('Default');
            if(synth) synth.cancel();
        }

        elements.actionBtn.addEventListener('click', () => {
            if (state.captured && !state.isScanning) reset();
            else handleScan();
        });

        elements.muteBtn.addEventListener('click', () => {
            state.mute = !state.mute;
            if (state.mute && synth) synth.cancel();
            elements.volumeIcon.setAttribute('data-lucide', state.mute ? 'volume-x' : 'volume-2');
            elements.muteBtn.classList.toggle('bg-red-800', state.mute);
            elements.muteBtn.classList.toggle('text-red-400', state.mute);
            lucide.createIcons();
        });

        window.onload = startCamera;
    </script>
</body>
</html>
